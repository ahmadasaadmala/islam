<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c32 0%, #2a4a3f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            direction: rtl;
        }

        .header {
            background: linear-gradient(135deg, #0b2b23 0%, #1a3f35 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 4px solid #d4a373;
        }

        .header h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .stats-container {
            display: flex;
            justify-content: space-around;
            background: #f0f4f3;
            padding: 20px;
            border-bottom: 1px solid #ccc;
        }

        .stat-box {
            text-align: center;
            background: white;
            padding: 10px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .stat-box span {
            font-size: 1.8rem;
            font-weight: bold;
            color: #0b2b23;
            display: block;
        }

        .stat-box label {
            color: #555;
            font-size: 1rem;
        }

        .quiz-area {
            padding: 30px;
            background: #f9fbfa;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #d4a373, #b5835a);
            width: 0%;
            transition: width 0.5s ease;
        }

        .question-counter {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.2rem;
            color: #0b2b23;
            font-weight: 600;
        }

        .question-box {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .question-text {
            font-size: 1.5rem;
            color: #0b2b23;
            margin-bottom: 30px;
            line-height: 1.6;
            font-weight: 500;
            border-right: 4px solid #d4a373;
            padding-right: 20px;
        }

        .options-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .option {
            background: #f5f7f7;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1rem;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .option:hover:not(.disabled-option) {
            background: #e8f0ed;
            border-color: #2a4a3f;
        }

        .option.selected {
            background: #0b2b23;
            color: white;
            border-color: #d4a373;
        }

        .option.correct {
            background: #28a745;
            color: white;
            border-color: #1e7e34;
        }

        .option.wrong {
            background: #dc3545;
            color: white;
            border-color: #bd2130;
        }

        .option.disabled-option {
            pointer-events: none;
            opacity: 0.7;
        }

        .option-prefix {
            width: 30px;
            height: 30px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .selected .option-prefix {
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        .nav-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .prev-btn {
            background: #6c757d;
            color: white;
        }

        .next-btn {
            background: #0b2b23;
            color: white;
        }

        .reset-btn {
            background: #dc3545;
            color: white;
            width: 100%;
            margin-top: 20px;
            justify-content: center;
        }

        .nav-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .footer {
            text-align: center;
            padding: 20px;
            background: #0b2b23;
            color: white;
            font-size: 0.9rem;
        }

        .result-screen {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 20px;
            margin: 20px;
        }

        .result-screen h2 {
            color: #0b2b23;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .result-score {
            font-size: 4rem;
            color: #d4a373;
            font-weight: bold;
            margin: 20px 0;
        }

        .result-message {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 30px;
        }

        .warning-message {
            background: #fff3cd;
            color: #856404;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .options-container {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 1.6rem;
            }
            
            .question-text {
                font-size: 1.2rem;
            }
            
            .nav-buttons {
                flex-wrap: wrap;
                gap: 10px;
            }
            
            .nav-btn {
                padding: 12px 20px;
                font-size: 1rem;
            }
        }
    </style>
</head>

        // پێکهاتەکانی ئەپ
        let currentQuestionIndex = 0;
        let userAnswers = new Array(questions.length).fill(null);
        let questionLocked = new Array(questions.length).fill(false);
        let score = 0;

        const quizArea = document.getElementById('quiz-area');
        const scoreSpan = document.getElementById('score');
        const answeredSpan = document.getElementById('answered-count');
        const remainingSpan = document.getElementById('remaining-count');

        function calculateStats() {
            const answered = userAnswers.filter(a => a !== null).length;
            const remaining = questions.length - answered;

            answeredSpan.textContent = answered;
            remainingSpan.textContent = remaining;
            scoreSpan.textContent = score;
        }

        function handleAnswerSelection(optionIndex) {
            if (questionLocked[currentQuestionIndex] || userAnswers[currentQuestionIndex] !== null) {
                return;
            }

            const isCorrect = (optionIndex === questions[currentQuestionIndex].correct);
            
            userAnswers[currentQuestionIndex] = optionIndex;
            
            if (!isCorrect) {
                questionLocked[currentQuestionIndex] = true;
            } else {
                score++;
            }

            renderQuestion();
            calculateStats();
        }

        function renderQuestion() {
            const q = questions[currentQuestionIndex];
            const selectedAnswer = userAnswers[currentQuestionIndex];
            const isLocked = questionLocked[currentQuestionIndex];
            const isAnswered = selectedAnswer !== null;

            const prefixes = ["أ", "ب", "ج", "د"];

            let optionsHtml = '';
            q.options.forEach((opt, idx) => {
                let optionClass = 'option';
                
                if (isLocked || isAnswered) {
                    optionClass += ' disabled-option';
                    
                    if (idx === q.correct) {
                        optionClass += ' correct';
                    } else if (idx === selectedAnswer && selectedAnswer !== q.correct) {
                        optionClass += ' wrong';
                    }
                } else if (idx === selectedAnswer) {
                    optionClass += ' selected';
                }

                optionsHtml += `
                    <div class="${optionClass}" data-option-index="${idx}">
                        <span class="option-prefix">${prefixes[idx]}</span>
                        ${opt}
                    </div>
                `;
            });

            const progressPercent = ((currentQuestionIndex + 1) / questions.length) * 100;

            let warningMessage = '';
            if (isLocked && selectedAnswer !== null && selectedAnswer !== q.correct) {
                warningMessage = `
                    <div class="warning-message">
                        ⚠️ وەڵامی هەڵەت دا! ناتوانیت وەڵامی تر بەم پرسیارە بدەیت.
                        وەڵامی ڕاست: ${q.options[q.correct]}
                    </div>
                `;
            }

            quizArea.innerHTML = `
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${progressPercent}%"></div>
                </div>
                <div class="question-counter">
                    پرسیاری ${currentQuestionIndex + 1} لە ${questions.length}
                </div>
                ${warningMessage}
                <div class="question-box">
                    <div class="question-text">
                        <span style="background: #0b2b23; color: white; padding: 5px 15px; border-radius: 50px; font-size: 0.9rem; margin-left: 15px;">
                            ${q.category}
                        </span>
                        ${q.question}
                    </div>
                    <div class="options-container" id="options-container">
                        ${optionsHtml}
                    </div>
                </div>
                <div class="nav-buttons">
                    <button class="nav-btn prev-btn" ${currentQuestionIndex === 0 ? 'disabled' : ''} onclick="changeQuestion(-1)">
                        ← پێشتر
                    </button>
                    <button class="nav-btn next-btn" ${currentQuestionIndex === questions.length - 1 ? 'disabled' : ''} onclick="changeQuestion(1)">
                        دواتر →
                    </button>
                </div>
                ${currentQuestionIndex === questions.length - 1 ? `
                    <button class="nav-btn reset-btn" onclick="showFinalResult()">
                        تەواوکردنی تاقیکردنەوە
                    </button>
                ` : ''}
            `;

            if (!isLocked && !isAnswered) {
                document.querySelectorAll('.option').forEach(opt => {
                    opt.addEventListener('click', function() {
                        const optionIndex = parseInt(this.dataset.optionIndex);
                        handleAnswerSelection(optionIndex);
                    });
                });
            }
        }

        window.changeQuestion = function(direction) {
            const newIndex = currentQuestionIndex + direction;
            if (newIndex >= 0 && newIndex < questions.length) {
                currentQuestionIndex = newIndex;
                renderQuestion();
            }
        };

        window.showFinalResult = function() {
            const totalAnswered = userAnswers.filter(a => a !== null).length;
            const percentage = totalAnswered > 0 ? Math.round((score / totalAnswered) * 100) : 0;
            
            let message = '';
            if (score >= 160) message = 'زۆر باش! تۆ شارەزایەکی ئیسلامی بەرزی.';
            else if (score >= 130) message = 'باشە. کەمێک زیاتر بخوێنە.';
            else if (score >= 90) message = 'ناوەسطیت. هەوڵ بدە زیاتر بزانیت.';
            else message = 'پێویستە زیاتر بخوێنیت لەسەر ئیسلام.';

            quizArea.innerHTML = `

                        دەستپێکردنەوە
                    </button>
                </div>

        };

            currentQuestionIndex = 0;

            renderQuestion();
            calculateStats();
        };

        renderQuestion();
        calculateStats();
